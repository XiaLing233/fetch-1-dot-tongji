services:
  mariadb:
    image: mariadb:lts
    container_name: ftj-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    command: --default-time-zone=+08:00
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sqls/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "-uroot", "-p$MYSQL_ROOT_PASSWORD", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:8.4-alpine
    container_name: ftj-redis
    restart: always

  backend:
    image: ghcr.io/xialing233/fetch-1-dot-tongji-backend:latest
    build: ./backend
    container_name: ftj-backend
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      REDIS_HOST: redis
    volumes:
      - ./backend/keys:/app/keys:ro
      - ./backend/data/background:/app/data/background:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/background"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always

  frontend:
    image: ghcr.io/xialing233/fetch-1-dot-tongji-frontend:latest
    build: ./frontend
    container_name: ftj-frontend
    ports:
      - "1241:80"
    depends_on:
      - backend
    restart: always

  email-consumer:
    build: ./email-consumer
    container_name: ftj-email-consumer
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_started
    restart: always

  crawler:
    image: ghcr.io/xialing233/fetch-1-dot-tongji-crawler:latest
    build: ./crawler
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      REDIS_HOST: redis
    profiles: ["crawler"]
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

networks:
  default:
    name: ftj_network

volumes:
  mariadb_data:
